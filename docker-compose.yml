version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ffces_user:ffces_pass@db:5432/ffces_db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=change-this-in-production-ffces-2024
      - DEBUG=true
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./app:/app/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ffces_db
      POSTGRES_USER: ffces_user
      POSTGRES_PASSWORD: ffces_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c shared_preload_libraries='pgcrypto'
      -c max_connections=200

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://ffces_user:ffces_pass@db:5432/ffces_db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=change-this-in-production-ffces-2024
    depends_on:
      - db
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
  minio_data:
