version: '3.8'

services:
  # ── Web Service (Frontend + Backend in ONE container) ──
  ffces:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ffces-web
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ffces_user:${DB_PASSWORD:-ffces_pass}@postgres:5432/ffces_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-this-production-secret-key-2024}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - CORS_ORIGINS=["*"]
      - DEBUG=false
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    volumes:
      - ffces_data:/app/data

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:15-alpine
    container_name: ffces-postgres
    environment:
      POSTGRES_DB: ffces_db
      POSTGRES_USER: ffces_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ffces_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_preload_libraries='pgcrypto'
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffces_user -d ffces_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # ── Redis Cache ──
  redis:
    image: redis:7-alpine
    container_name: ffces-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: always

volumes:
  ffces_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
